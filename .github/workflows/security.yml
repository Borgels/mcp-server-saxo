name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  secret-pattern-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan tracked files for obvious secret-like values
        run: |
          set -euo pipefail
          pattern='eyJ[A-Za-z0-9_-]{10,}\.|sk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY'
          matches="$(git grep -l -I -E "$pattern" -- . || true)"
          if [ -n "$matches" ]; then
            echo "::error::Potential secret-like values found in tracked files:"
            echo "$matches"
            exit 1
          fi

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev
